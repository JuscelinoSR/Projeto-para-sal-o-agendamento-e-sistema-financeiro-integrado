<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Login administrativo do BeautyJSR.">
  <title>BeautyJSR | Login Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand" href="index.html" aria-label="Voltar para o site BeautyJSR">
        <span class="brand-mark">B</span>
        <span>BeautyJSR Admin</span>
      </a>

      <div>
        <p class="eyebrow">Acesso restrito</p>
        <h1>Entrar no painel</h1>
        <p>Use seu nome de usuário e senha para acessar o painel administrativo.</p>
      </div>

      <form class="auth-form" data-login-form>
        <label for="username">Nome de usuário</label>
        <input id="username" name="username" type="text" autocomplete="username" required placeholder="admin">

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Sua senha">

        <button class="button primary" type="submit">Entrar</button>
        <p class="auth-message" data-auth-message aria-live="polite"></p>
      </form>

      <a class="button secondary" href="index.html">Voltar ao site</a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
</body>
</html>
